<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Estoque e Ferramentas</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <th:block th:replace="~{fragments :: estilos}"></th:block>
</head>
<body class="bg-light">

    <div class="d-flex">
        <div th:replace="~{fragments :: menuLateral('estoque')}"></div>

        <div class="flex-grow-1 p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold mb-0"><i class="bi bi-box-seam text-primary me-2"></i>Almoxarifado & Arsenal</h4>
            </div>

            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-bold mb-4"><i class="bi bi-plus-circle-fill me-2"></i>Novo Item</h5>
                            
                            <form th:action="@{/estoque/salvar}" method="POST">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}" />
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-dark">Categoria do Item</label>
                                    <select name="tipo" class="form-select bg-light border-0 shadow-sm" required>
                                        <option value="MATERIAL">📦 Material de Consumo (Tubos, fios, etc)</option>
                                        <option value="FERRAMENTA">🛠️ Ferramenta / Equipamento (Furadeira, escada)</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-dark">Nome do Item</label>
                                    <input type="text" name="nome" class="form-control bg-light border-0 shadow-sm" placeholder="Ex: Furadeira Bosch 12v" required>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-bold small text-dark">Especificação / Marca</label>
                                    <input type="text" name="descricao" class="form-control bg-light border-0 shadow-sm" placeholder="Detalhes técnicos...">
                                </div>

                                <div class="row g-2 mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-dark">Quantidade em mãos</label>
                                        <input type="number" name="quantidade" class="form-control bg-light border-0 shadow-sm" value="1" required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-dark">Valor Unitário (R$)</label>
                                        <input type="number" step="0.01" name="valorCusto" class="form-control bg-light border-0 shadow-sm" placeholder="0.00">
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow">
                                    <i class="bi bi-save me-2"></i> SALVAR NO ESTOQUE
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-bold mb-4"><i class="bi bi-card-checklist me-2"></i>Inventário Atual</h5>
                            
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Nome do Item</th>
                                            <th>Categoria</th>
                                            <th class="text-center">Qtd</th>
                                            <th>Valor (Custo)</th>
                                            <th class="text-center">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${itens}">
                                            <td>
                                                <span class="fw-bold d-block" th:text="${item.nome}"></span>
                                                <small class="text-muted" th:text="${item.descricao}"></small>
                                            </td>
                                            <td>
                                                <span class="badge" 
                                                      th:classappend="${item.tipo == 'FERRAMENTA' ? 'bg-primary' : 'bg-success'}"
                                                      th:text="${item.tipo == 'FERRAMENTA' ? '🛠️ Patrimônio' : '📦 Consumo'}">
                                                </span>
                                            </td>
                                            <td class="text-center">
                                                <span class="badge bg-light text-dark border fs-6" th:text="${item.quantidade}"></span>
                                            </td>
                                            <td class="fw-bold text-secondary">
                                                R$ <span th:text="${item.valorCusto != null ? #numbers.formatDecimal(item.valorCusto, 1, 'POINT', 2, 'COMMA') : '0,00'}"></span>
                                            </td>
                                            <td class="text-center">
                                                <a th:href="@{/estoque/excluir/{id}(id=${item.id})}" class="btn btn-sm btn-outline-danger border-0" onclick="return confirm('Excluir este item permanentemente?');">
                                                    <i class="bi bi-trash"></i>
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(itens)}">
                                            <td colspan="5" class="text-center text-muted py-4">Seu estoque e arsenal estão vazios. Adicione um item!</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
