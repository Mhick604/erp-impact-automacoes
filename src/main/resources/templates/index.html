<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<head>
	    <th:block th:replace="~{fragments :: estilos}"></th:block>
	</head>
	<body class="bg-light">
    <style>
        .card-dash { transition: transform 0.2s; }
        .card-dash:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-light">

	<div th:replace="~{fragments :: menuLateral('dashboard')}"></div>
    <div class="container py-4">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="text-secondary fw-bold"><i class="bi bi-speedometer2"></i> Visão Geral</h4>
            <p class="text-muted mb-0">Bem-vindo(a) ao painel da Impact Automações.</p>
        </div>

        <div class="row g-4 mb-5">
            
            <div class="col-md-3">
                <div class="card card-dash shadow-sm border-0 bg-primary text-white h-100 p-3">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6 class="text-white-50">Caixa Atual</h6>
                            <h3 class="fw-bold mb-0" th:text="'R$ ' + ${#numbers.formatDecimal(caixaAtual, 1, 'POINT', 2, 'COMMA')}"></h3>
                        </div>
                        <i class="bi bi-bank fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card card-dash shadow-sm border-0 bg-success text-white h-100 p-3">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6 class="text-white-50">Receitas (Pagas)</h6>
                            <h3 class="fw-bold mb-0" th:text="'R$ ' + ${#numbers.formatDecimal(totalReceitas, 1, 'POINT', 2, 'COMMA')}"></h3>
                        </div>
                        <i class="bi bi-graph-up-arrow fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card card-dash shadow-sm border-0 bg-info text-dark h-100 p-3">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6 class="text-dark-50">Ordens de Serviço</h6>
                            <h3 class="fw-bold mb-0" th:text="${totalOs}"></h3>
                        </div>
                        <i class="bi bi-clipboard-data fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card card-dash shadow-sm border-0 bg-warning text-dark h-100 p-3">
                    <div class="d-flex justify-content-between">
                        <div>
                            <h6 class="text-dark-50">Clientes Ativos</h6>
                            <h3 class="fw-bold mb-0" th:text="${totalClientes}"></h3>
                        </div>
                        <i class="bi bi-people fs-1 opacity-50"></i>
                    </div>
                </div>
            </div>

        </div>

        <h5 class="text-secondary fw-bold mb-3"><i class="bi bi-lightning-charge"></i> Ações Rápidas</h5>
        <div class="row g-3">
            <div class="col-md-3">
                <a href="/ordens" class="btn btn-outline-info w-100 py-3 fw-bold text-dark shadow-sm">
                    <i class="bi bi-plus-circle"></i> Criar Nova O.S.
                </a>
            </div>
            <div class="col-md-3">
                <a href="/clientes" class="btn btn-outline-secondary w-100 py-3 fw-bold shadow-sm">
                    <i class="bi bi-person-plus"></i> Novo Cliente
                </a>
            </div>
            <div class="col-md-3">
                <a href="/financeiro" class="btn btn-outline-success w-100 py-3 fw-bold shadow-sm">
                    <i class="bi bi-cash-coin"></i> Lançar Receita
                </a>
            </div>
            <div class="col-md-3">
                <a href="/financeiro" class="btn btn-outline-danger w-100 py-3 fw-bold shadow-sm">
                    <i class="bi bi-cart-dash"></i> Lançar Despesa
                </a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
