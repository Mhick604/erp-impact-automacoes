<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Impact Automações | Ordem de Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        /* Estilo da tela (Fundo cinza, folha branca no meio) */
        body { background-color: #f0f0f0; padding: 20px; font-family: Arial, sans-serif; }
        .a4-page {
            background: white; max-width: 800px; margin: 0 auto;
            padding: 40px; box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
        .header-os { border-bottom: 2px solid #0d6efd; padding-bottom: 20px; margin-bottom: 30px; }
        .info-box { background-color: #f8f9fa; border: 1px solid #dee2e6; border-radius: 5px; padding: 15px; margin-bottom: 20px; }
        .signature-line { border-top: 1px solid #000; width: 80%; margin: 60px auto 10px auto; }
        
        /* ========================================== */
        /* O MODO DE IMPRESSÃO (O SEGREDO FICA AQUI)  */
        /* ========================================== */
        @media print {
            /* 1. Remove o fundo cinza e sombras */
            body { background-color: white !important; padding: 0 !important; }
            
            /* 2. A folha A4 toma 100% do espaço, mas ganha uma margem de segurança de 1.5cm para a impressora não cortar */
            .a4-page { box-shadow: none !important; padding: 1.5cm !important; max-width: 100% !important; border: none !important; margin: 0 !important;}
            
            /* 3. A MÁGICA FINAL: Esconde a URL, a data e as páginas geradas pelo Chrome */
            @page { margin: 0; }
            
            /* Garante que as cores de fundo (como a das caixas) apareçam no PDF */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <div class="a4-page">
        <div class="header-os d-flex justify-content-between align-items-center">
            <div>
                <h2 class="text-primary fw-bold mb-1">
                    <i class="bi bi-cpu"></i> <span th:text="${empresa.nomeFantasia != null ? empresa.nomeFantasia : 'Impact Automações'}"></span>
                </h2>
                <small class="text-muted fw-bold d-block" th:text="'CNPJ: ' + ${empresa.cnpj != null ? empresa.cnpj : 'Não informado'}"></small>
                <small class="text-muted d-block" th:text="${empresa.telefone != null ? empresa.telefone : ''}"></small>
            </div>
            <div class="text-end">
                <h4 class="text-secondary mb-0">ORDEM DE SERVIÇO</h4>
                <h4 class="fw-bold text-dark" th:text="'Nº #' + ${os.id}"></h4>
                <span class="badge bg-light text-dark border"><i class="bi bi-calendar3 me-1"></i> Data: <span th:text="${#temporals.format(os.dataAbertura, 'dd/MM/yyyy')}"></span></span>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6">
                <div class="info-box h-100">
                    <h6 class="text-primary fw-bold border-bottom pb-2 mb-3"><i class="bi bi-person-badge"></i> Dados do Cliente</h6>
                    <div class="mb-1"><strong>Nome:</strong> <span th:text="${os.cliente.nome}"></span></div>
                    <div class="mb-1"><strong>CPF/CNPJ:</strong> <span th:text="${os.cliente.cpfCnpj != null ? os.cliente.cpfCnpj : '---'}"></span></div>
                    <div><strong>Telefone:</strong> <span th:text="${os.cliente.telefone}"></span></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="info-box h-100">
                    <h6 class="text-primary fw-bold border-bottom pb-2 mb-3"><i class="bi bi-tools"></i> Responsável Técnico</h6>
                    <div class="mb-1"><strong>Técnico:</strong> <span th:text="${os.tecnico.nome}"></span></div>
                    <div class="mb-1"><strong>Especialidade:</strong> <span th:text="${os.tecnico.especialidade}"></span></div>
                    <div><strong>Status da O.S.:</strong> <span th:text="${os.status}" class="fw-bold text-success"></span></div>
                </div>
            </div>
        </div>

        <div class="info-box mt-3">
            <h6 class="text-primary fw-bold border-bottom pb-2 mb-3"><i class="bi bi-card-text"></i> Descrição do Serviço / Diagnóstico</h6>
            <p style="white-space: pre-line; min-height: 80px;" class="mb-0 text-dark" th:text="${os.descricao}"></p>
        </div>

        <div class="text-end mt-4 mb-5 p-3 bg-light rounded border border-success border-opacity-25">
            <h5 class="text-secondary d-inline me-3 mb-0">Valor Fechado:</h5>
            <h3 class="text-success d-inline fw-bold mb-0" th:text="'R$ ' + ${#numbers.formatDecimal(os.valor, 1, 'POINT', 2, 'COMMA')}"></h3>
        </div>

        <div class="row text-center mt-5 pt-5">
            <div class="col-6">
                <div class="signature-line"></div>
                <small class="fw-bold text-dark text-uppercase" th:text="${empresa.nomeFantasia != null ? empresa.nomeFantasia : 'Impact Automações'}"></small><br>
                <small class="text-muted">Prestador do Serviço</small>
            </div>
            <div class="col-6">
                <div class="signature-line"></div>
                <small class="fw-bold text-dark text-uppercase" th:text="${os.cliente.nome}"></small><br>
                <small class="text-muted">Cliente / Contratante</small>
            </div>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(function() {
                window.print();
            }, 800); // 800ms garante que o Bootstrap desenhou a tela 100% antes de gerar o PDF
        }
    </script>
</body>
</html>
