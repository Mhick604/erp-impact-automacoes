<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<head>
    <th:block th:replace="~{fragments :: estilos}"></th:block>
</head>
<body class="bg-light">

    <div th:replace="~{fragments :: menuLateral('clientes')}"></div>
<body class="bg-light">
    <div class="container py-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 p-4 mb-4">
                    <h5 class="card-title mb-4"><i class="bi bi-person-plus"></i> Novo Cliente</h5>
                    <form th:action="@{/clientes/salvar}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nome / Razão Social</label>
                            <input type="text" name="nome" class="form-control" placeholder="Ex: João Silva" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">CPF ou CNPJ</label>
                            <input type="text" name="cpfCnpj" class="form-control" data-mascara="cpfCnpj" maxlength="18" placeholder="000.000.000-00">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Serviço de Interesse</label>
                            <input type="text" name="tipoServico" class="form-control" placeholder="Ex: Automação Residencial">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Telefone</label>
                            <input type="text" name="telefone" class="form-control" data-mascara="telefone" maxlength="15" placeholder="(00) 00000-0000">
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-lg"></i> Salvar Cliente
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0 p-4">
                    <h5 class="card-title mb-4"><i class="bi bi-people"></i> Clientes Cadastrados</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nome</th>
                                    <th>CPF/CNPJ</th>
                                    <th>Serviço</th>
                                    <th>Telefone</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="c : ${clientes}">
                                    <td th:text="${c?.nome}" class="fw-bold"></td>
                                    <td th:text="${c?.cpfCnpj != null and !c.cpfCnpj.empty ? c.cpfCnpj : '---'}"></td>
                                    <td><span class="badge bg-info text-dark" th:text="${c?.tipoServico}"></span></td>
                                    <td th:text="${c?.telefone}"></td>
                                    <td class="text-center">
                                        <a th:if="${c?.id != null}" 
                                           th:href="@{/clientes/excluir/{id}(id=${c.id})}" 
                                           class="btn btn-outline-danger btn-sm"
                                           onclick="return confirm('Deseja realmente excluir este cliente?')">
                                           <i class="bi bi-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const mascaras = {
                telefone(value) {
                    value = value.replace(/\D/g, '');
                    value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
                    value = value.replace(/(\d)(\d{4})$/, '$1-$2');
                    return value;
                },
                cpfCnpj(value) {
                    value = value.replace(/\D/g, '');
                    if (value.length <= 11) {
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    } else {
                        value = value.replace(/^(\d{2})(\d)/, '$1.$2');
                        value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                        value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
                        value = value.replace(/(\d{4})(\d)/, '$1-$2');
                    }
                    return value;
                }
            };

            document.querySelectorAll('input[data-mascara]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const tipo = e.target.dataset.mascara;
                    if (mascaras[tipo]) {
                        e.target.value = mascaras[tipo](e.target.value);
                    }
                });
            });
        });
    </script>
</body>
</html>
