<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Ordens de Serviço</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <th:block th:replace="~{fragments :: estilos}"></th:block>
</head>
<body class="bg-light">

    <div class="d-flex">
        <div th:replace="~{fragments :: menuLateral('ordens')}"></div>

        <div class="flex-grow-1 p-4">
            
            <div class="row">
                <div class="col-lg-4 mb-4">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-bold mb-4"><i class="bi bi-plus-square-dotted me-2"></i>Nova O.S.</h5>
                            
							<form th:action="@{/ordens/salvar}" method="POST" enctype="multipart/form-data">
							                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}" />
							                        <input type="hidden" name="id" th:value="${os.id}">
							                        <input type="hidden" name="cliente" th:value="${os.cliente?.id}">
							                        <input type="hidden" name="codigoImovel" th:value="${os.codigoImovel}">
							                        
							                        <div class="modal-body p-4">
							                            <div class="row g-3">
							                                <div class="col-md-4">
							                                    <label class="form-label small fw-bold text-primary">Atualizar Status</label>
							                                    <select name="status" class="form-select bg-light fw-bold">
							                                        <option value="ABERTA" th:selected="${os.status == 'ABERTA'}">🟢 Aberta</option>
							                                        <option value="EM_ANDAMENTO" th:selected="${os.status == 'EM_ANDAMENTO'}">🟡 Em Andamento</option>
							                                        <option value="CONCLUIDA" th:selected="${os.status == 'CONCLUIDA'}">✅ Concluída</option>
							                                        <option value="CANCELADA" th:selected="${os.status == 'CANCELADA'}">🔴 Cancelada</option>
							                                    </select>
							                                </div>
							                                
							                                <div class="col-md-5">
							                                    <label class="form-label small fw-bold text-danger"><i class="bi bi-person-fill-gear me-1"></i>Repassar Serviço Para:</label>
							                                    <select name="tecnico" class="form-select bg-light border-danger border-opacity-25" required>
							                                        <option value="">Selecione um técnico...</option>
							                                        <option th:each="t : ${tecnicos}" 
							                                                th:value="${t.id}" 
							                                                th:text="${t.nome}"
							                                                th:selected="${os.tecnico != null and t.id == os.tecnico.id}">
							                                        </option>
							                                    </select>
							                                </div>

							                                <div class="col-md-3">
							                                    <label class="form-label small fw-bold text-success">Valor (R$)</label>
							                                    <input type="number" step="0.01" name="valor" class="form-control bg-light" th:value="${os.valor}">
							                                </div>
							                                
							                                <div class="col-md-12">
							                                    <label class="form-label small fw-bold">Diagnóstico / Defeito</label>
							                                    <textarea name="descricao" class="form-control bg-light" rows="2" th:text="${os.descricao}"></textarea>
							                                </div>
							                                <div class="col-md-12">
							                                    <label class="form-label small fw-bold">Serviço Realizado</label>
							                                    <textarea name="servicoRealizado" class="form-control bg-light" rows="2" th:text="${os.servicoRealizado}"></textarea>
							                                </div>
							                            </div>
							                        </div>
							                        <div class="modal-footer border-0 bg-light">
							                            <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancelar</button>
							                            <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold"><i class="bi bi-arrow-repeat me-2"></i>Salvar Atualizações</button>
							                        </div>
                                <div class="p-3 mb-4 bg-primary bg-opacity-10 border border-primary border-opacity-25 rounded-3 shadow-sm">
                                    <h6 class="fw-bold text-primary mb-3"><i class="bi bi-info-circle-fill me-2"></i>1. Identificação da O.S.</h6>
                                    
                                    <div class="row g-2 mb-2">
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small text-dark mb-1">Tipo</label>
                                            <select name="tipo" class="form-select border-0 shadow-sm">
                                                <option value="DEFINITIVA">🔧 O.S. Definitiva</option>
                                                <option value="ORCAMENTO">📝 Orçamento</option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small text-dark mb-1">Cód. Imóvel</label>
                                            <input type="text" name="codigoImovel" class="form-control border-0 shadow-sm" placeholder="Ex: Cód 3344">
                                        </div>
                                    </div>
                                    <div class="row g-2">
                                        <div class="col-md-5">
                                            <label class="form-label fw-bold small text-dark mb-1">Data Finalização</label>
                                            <input type="date" name="dataFinalizacao" class="form-control border-0 shadow-sm">
                                        </div>
                                        <div class="col-md-7">
                                            <label class="form-label fw-bold small text-dark mb-1"><i class="bi bi-camera me-1"></i>Fotos (Antes/Depois)</label>
                                            <input type="file" name="arquivosFotos" class="form-control border-0 shadow-sm text-muted" multiple accept="image/*">
                                        </div>
                                    </div>
                                </div>

                                <div class="p-3 mb-4 bg-danger bg-opacity-10 border border-danger border-opacity-25 rounded-3 shadow-sm">
                                    <h6 class="fw-bold text-danger mb-3"><i class="bi bi-tools me-2"></i>2. Diagnóstico e Serviço</h6>
                                    
                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-dark mb-1">Problemas Identificados</label>
                                        <textarea name="problemasIdentificados" class="form-control border-0 shadow-sm" rows="2" placeholder="Descreva os vazamentos, defeitos, etc..."></textarea>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-dark mb-1">Serviço a ser Realizado</label>
                                        <textarea name="servicoRealizado" class="form-control border-0 shadow-sm" rows="2" placeholder="O que será consertado ou trocado?"></textarea>
                                    </div>
                                    <div>
                                        <label class="form-label fw-bold small text-dark mb-1">Observações / Peças extras</label>
                                        <textarea name="observacoes" class="form-control border-0 shadow-sm text-muted" rows="1" placeholder="Ex: Cliente vai comprar o material..."></textarea>
                                    </div>
                                </div>

                                <div class="p-3 mb-4 bg-success bg-opacity-10 border border-success border-opacity-25 rounded-3 shadow-sm">
                                    <h6 class="fw-bold text-success mb-3"><i class="bi bi-check-circle-fill me-2"></i>3. Fechamento e Valores</h6>
                                    
                                    <div class="mb-3">
                                        <label class="form-label fw-bold small text-dark mb-1">Título Resumido do Serviço</label>
                                        <input type="text" name="descricao" class="form-control border-0 shadow-sm" placeholder="Ex: Reparo hidráulico na suíte..." required>
                                    </div>

                                    <div class="row g-2 mb-3">
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small text-dark mb-1">Cliente / Imobiliária</label>
                                            <select name="cliente" class="form-select border-0 shadow-sm" required>
                                                <option value="">Selecione...</option>
                                                <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
                                            </select>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small text-dark mb-1">Técnico Designado</label>
                                            <select name="tecnico" class="form-select border-0 shadow-sm" required>
                                                <option value="">Selecione...</option>
                                                <option th:each="t : ${tecnicos}" th:value="${t.id}" th:text="${t.nome}"></option>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row g-2">
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small text-dark mb-1">Valor (R$)</label>
                                            <div class="input-group input-group-sm shadow-sm">
                                                <span class="input-group-text bg-success text-white border-0 fw-bold">R$</span>
                                                <input type="number" step="0.01" name="valor" class="form-control border-0" placeholder="0.00">
                                            </div>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label fw-bold small text-dark mb-1">Status da O.S.</label>
                                            <select name="status" class="form-select border-0 shadow-sm fw-bold text-secondary">
                                                <option value="ABERTA">🟢 Aberta</option>
                                                <option value="EM_ANDAMENTO">🟡 Em Andamento</option>
                                                <option value="CONCLUIDA">🔵 Concluída</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow">
                                    <i class="bi bi-save me-2"></i> SALVAR ORDEM DE SERVIÇO
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h5 class="card-title fw-bold mb-4"><i class="bi bi-card-checklist me-2"></i>Serviços em Andamento</h5>
                            
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Nº O.S.</th>
                                            <th>Cliente</th>
                                            <th>Técnico</th>
                                            <th>Valor</th>
                                            <th>Status</th>
                                            <th class="text-center">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="os : ${ordens}">
                                            <td class="fw-bold text-secondary">#<span th:text="${os.id}"></span></td>
                                            
                                            <td class="fw-bold" th:text="${os.cliente?.nome ?: 'Sem Cliente'}"></td>
                                            <td th:text="${os.tecnico?.nome ?: 'Sem Técnico'}"></td>
                                            
                                            <td class="fw-bold text-success">
                                                R$ <span th:text="${os.valor != null ? #numbers.formatDecimal(os.valor, 1, 'POINT', 2, 'COMMA') : '0,00'}"></span>
                                            </td>
                                            
                                            <td>
                                                <span class="badge" 
                                                      th:classappend="${os.status == 'ABERTA' ? 'bg-success' : (os.status == 'EM_ANDAMENTO' ? 'bg-warning text-dark' : 'bg-primary')}"
                                                      th:text="${os.status ?: 'SEM STATUS'}">
                                                </span>
                                            </td>
                                            <td class="text-center text-nowrap">
                                                
                                                <textarea th:id="'textoZap-' + ${os.id}" class="d-none" th:text="|*O.S. #${os.id}*
*Cliente:* ${os.cliente?.nome ?: 'Sem Cliente'}
*Endereço:* ${os.cliente?.endereco ?: 'Endereço não cadastrado'}
*Diagnóstico:* ${os.descricao ?: 'Não informado'}
*Valor:* R$ ${os.valor != null ? #numbers.formatDecimal(os.valor, 1, 'POINT', 2, 'COMMA') : '0,00'}|"></textarea>

                                                <a th:href="@{/ordens/imprimir/{id}(id=${os.id})}" target="_blank" class="btn btn-sm btn-outline-secondary border-0 shadow-sm" title="Gerar PDF">
                                                    <i class="bi bi-printer"></i>
                                                </a>
                                                
                                                <button type="button" class="btn btn-sm btn-outline-success border-0 shadow-sm mx-1" title="Enviar WhatsApp"
                                                        th:onclick="|enviarZap(${os.id})|">
                                                    <i class="bi bi-whatsapp"></i>
                                                </button>
                                                
                                                <button type="button" class="btn btn-sm btn-outline-primary border-0 me-1 shadow-sm" title="Editar O.S."
                                                        data-bs-toggle="modal" th:data-bs-target="|#modalEditOS${os.id}|">
                                                    <i class="bi bi-pencil-square"></i>
                                                </button>
                                                
                                                <th:block th:if="${not #lists.isEmpty(os.fotos)}">
                                                    <button type="button" class="btn btn-sm btn-outline-info border-0 shadow-sm me-1" title="Ver Fotos" data-bs-toggle="modal" th:data-bs-target="|#modalFotos${os.id}|">
                                                        <i class="bi bi-images"></i> <span class="badge bg-info text-dark ms-1" th:text="${#lists.size(os.fotos)}"></span>
                                                    </button>
                                                </th:block>

                                                <a th:href="@{/ordens/excluir/{id}(id=${os.id})}" class="btn btn-sm btn-outline-danger border-0 shadow-sm" onclick="return confirm('Excluir esta OS?');" title="Excluir">
                                                    <i class="bi bi-trash"></i>
                                                </a>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(ordens)}">
                                            <td colspan="6" class="text-center text-muted py-4">Nenhuma ordem de serviço cadastrada.</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:each="os : ${ordens}">
        
        <div class="modal fade" th:id="|modalEditOS${os.id}|" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg rounded-4">
                    <div class="modal-header bg-light border-0">
                        <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square text-primary me-2"></i>Editar O.S. #<span th:text="${os.id}"></span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <form th:action="@{/ordens/salvar}" method="POST" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}" />
                        <input type="hidden" name="id" th:value="${os.id}">
                        <input type="hidden" name="cliente" th:value="${os.cliente?.id}">
                        <input type="hidden" name="tecnico" th:value="${os.tecnico?.id}">
                        <input type="hidden" name="codigoImovel" th:value="${os.codigoImovel}">
                        
                        <div class="modal-body p-4">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-primary">Atualizar Status</label>
                                    <select name="status" class="form-select bg-light fw-bold">
                                        <option value="ABERTA" th:selected="${os.status == 'ABERTA'}">🟢 Aberta</option>
                                        <option value="EM_ANDAMENTO" th:selected="${os.status == 'EM_ANDAMENTO'}">🟡 Em Andamento</option>
                                        <option value="CONCLUIDA" th:selected="${os.status == 'CONCLUIDA'}">✅ Concluída</option>
                                        <option value="CANCELADA" th:selected="${os.status == 'CANCELADA'}">🔴 Cancelada</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-success">Valor Fechado (R$)</label>
                                    <input type="number" step="0.01" name="valor" class="form-control bg-light" th:value="${os.valor}">
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label small fw-bold">Diagnóstico / Defeito</label>
                                    <textarea name="descricao" class="form-control bg-light" rows="2" th:text="${os.descricao}"></textarea>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label small fw-bold">Serviço Realizado</label>
                                    <textarea name="servicoRealizado" class="form-control bg-light" rows="2" th:text="${os.servicoRealizado}"></textarea>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer border-0 bg-light">
                            <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Salvar Alterações</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <th:block th:if="${not #lists.isEmpty(os.fotos)}">
            <div class="modal fade" th:id="|modalFotos${os.id}|" tabindex="-1" aria-hidden="true">
                <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                    <div class="modal-content border-0 shadow-lg">
                        <div class="modal-header bg-dark text-white border-0">
                            <h5 class="modal-title"><i class="bi bi-camera me-2"></i>Fotos do Serviço O.S. #<span th:text="${os.id}"></span></h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body text-center bg-secondary bg-opacity-10 py-4">
                            <div th:each="foto, iterStat : ${os.fotos}" class="mb-4 position-relative">
                                <span class="badge bg-dark position-absolute top-0 start-50 translate-middle mt-2 z-3 shadow">
                                    Foto <span th:text="${iterStat.count}"></span>
                                </span>
                                <img th:src="@{/ordens/foto/{idOs}/{indice}(idOs=${os.id}, indice=${iterStat.index})}" class="img-fluid rounded-3 shadow" style="max-height: 600px; border: 4px solid white;">
                            </div>
                        </div>
                        <div class="modal-footer border-0 bg-light">
                            <button type="button" class="btn btn-secondary fw-bold" data-bs-dismiss="modal">Fechar</button>
                        </div>
                    </div>
                </div>
            </div>
        </th:block>
    </th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    function enviarZap(id) {
        let textoAFormatado = document.getElementById('textoZap-' + id).value;
        let link = 'https://api.whatsapp.com/send?text=' + encodeURIComponent(textoAFormatado);
        window.open(link, '_blank');
    }
    </script>
</body>
</html>
