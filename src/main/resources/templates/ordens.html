<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Ordens de Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<head>
    <th:block th:replace="~{fragments :: estilos}"></th:block>
</head>
<body class="bg-light">

    <div th:replace="~{fragments :: menuLateral('ordens')}"></div>
<body class="bg-light">
    <div class="container py-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 p-4 mb-4">
                    <h5 class="card-title mb-4"><i class="bi bi-file-earmark-plus"></i> Nova O.S.</h5>
                    <form th:action="@{/ordens/salvar}" method="POST">
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Selecione o Cliente</label>
                            <select name="cliente" class="form-select" required>
                                <option value="">Escolha um cliente...</option>
                                <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Técnico Responsável</label>
                            <select name="tecnico" class="form-select" required>
                                <option value="">Escolha um técnico...</option>
                                <option th:each="t : ${tecnicos}" th:value="${t.id}" th:text="${t.nome}"></option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold">Descrição do Serviço</label>
                            <textarea name="descricao" class="form-control" rows="3" placeholder="Ex: Instalação de fita LED e relés Wi-Fi" required></textarea>
                        </div>

                        <div class="row mb-3">
                            <div class="col-6">
                                <label class="form-label small fw-bold">Valor (R$)</label>
                                <input type="number" name="valor" class="form-control" step="0.01" placeholder="0.00" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small fw-bold">Status</label>
                                <select name="status" class="form-select">
                                    <option value="PENDENTE">Pendente</option>
                                    <option value="ANDAMENTO">Em Andamento</option>
                                    <option value="CONCLUIDA">Concluída</option>
                                </select>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-info w-100 text-dark fw-bold">
                            <i class="bi bi-check-lg"></i> Salvar O.S.
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0 p-4">
                    <h5 class="card-title mb-4"><i class="bi bi-card-checklist"></i> Serviços em Andamento</h5>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Nº O.S.</th>
                                    <th>Cliente</th>
                                    <th>Técnico</th>
                                    <th>Valor</th>
                                    <th>Status</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="os : ${ordens}">
                                    <td class="fw-bold text-secondary" th:text="'#' + ${os.id}"></td>
                                    <td class="fw-bold" th:text="${os?.cliente?.nome}"></td>
                                    <td th:text="${os?.tecnico?.nome}"></td>
                                    <td class="text-success fw-bold" th:text="'R$ ' + ${#numbers.formatDecimal(os.valor, 1, 'POINT', 2, 'COMMA')}"></td>
                                    <td>
                                        <span class="badge" 
                                              th:classappend="${os.status == 'PENDENTE' ? 'bg-danger' : (os.status == 'ANDAMENTO' ? 'bg-warning text-dark' : 'bg-success')}" 
                                              th:text="${os.status}">
                                        </span>
                                    </td>
									
									<td class="text-center">
									        <a th:if="${os?.id != null}" th:href="@{/ordens/imprimir/{id}(id=${os.id})}" target="_blank" class="btn btn-outline-secondary btn-sm me-1" title="Gerar PDF">
									           <i class="bi bi-printer"></i>
									        </a>

									        <a th:if="${os?.id != null}" th:href="@{/ordens/excluir/{id}(id=${os.id})}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Excluir esta OS?')">
									           <i class="bi bi-trash"></i>
									        </a>
									    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
