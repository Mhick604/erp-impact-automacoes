<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact | Configurações da Empresa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<head>
    <th:block th:replace="~{fragments :: estilos}"></th:block>
</head>
<body class="bg-light">

    <div th:replace="~{fragments :: menuLateral('clientes')}"></div>
<body class="bg-light">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4">
                    
                    <div class="d-flex align-items-center mb-4 pb-3 border-bottom">
                        <div class="bg-primary text-white rounded p-3 me-3">
                            <i class="bi bi-building-gear fs-3"></i>
                        </div>
                        <div>
                            <h4 class="mb-0">Dados da Empresa</h4>
                            <small class="text-muted">Informações que aparecerão nos seus orçamentos e OS.</small>
                        </div>
                    </div>

                    <form th:action="@{/empresa/salvar}" method="POST" th:object="${empresa}">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-3">
                            <div class="col-md-8">
                                <label class="form-label small fw-bold">Nome Fantasia</label>
                                <input type="text" th:field="*{nomeFantasia}" class="form-control" placeholder="Ex: Impact Automações" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label small fw-bold">CNPJ</label>
                                <input type="text" th:field="*{cnpj}" class="form-control" data-mascara="cpfCnpj" maxlength="18" placeholder="00.000.000/0001-00">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">Telefone de Contato</label>
                                <input type="text" th:field="*{telefone}" class="form-control" data-mascara="telefone" maxlength="15" placeholder="(00) 00000-0000">
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label small fw-bold">E-mail Profissional</label>
                                <input type="email" th:field="*{email}" class="form-control" placeholder="contato@impact.com">
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label small fw-bold">Endereço Completo</label>
                                <input type="text" th:field="*{endereco}" class="form-control" placeholder="Rua, Número, Bairro, Cidade - UF">
                            </div>
                            
                            <div class="col-12 mt-4 text-end">
                                <button type="submit" class="btn btn-success px-4">
                                    <i class="bi bi-check2-circle me-1"></i> Salvar Dados
                                </button>
                            </div>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const mascaras = {
                telefone(value) {
                    value = value.replace(/\D/g, ''); // Tira letras
                    value = value.replace(/^(\d{2})(\d)/g, '($1) $2'); // DDD
                    value = value.replace(/(\d)(\d{4})$/, '$1-$2'); // Hífen
                    return value;
                },
                cpfCnpj(value) {
                    value = value.replace(/\D/g, '');
                    if (value.length <= 11) { // É CPF
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    } else { // É CNPJ
                        value = value.replace(/^(\d{2})(\d)/, '$1.$2');
                        value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                        value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
                        value = value.replace(/(\d{4})(\d)/, '$1-$2');
                    }
                    return value;
                },
                cep(value) {
					value = value.replace(/\D/g, '');
					                    value = value.replace(/^(\d{5})(\d)/, '$1-$2');
					                    return value;
					                }
					            };

					            // Aplica a máscara automaticamente
					            document.querySelectorAll('input[data-mascara]').forEach(input => {
					                input.addEventListener('input', (e) => {
					                    const tipo = e.target.dataset.mascara;
					                    if (mascaras[tipo]) {
					                        e.target.value = mascaras[tipo](e.target.value);
					                    }
					                });
					            });
					        });
					    </script>
					</body>
					</html>
