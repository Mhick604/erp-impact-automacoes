<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact ERP | Técnicos</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <th:block th:replace="~{fragments :: estilos}"></th:block>
</head>
<body class="bg-light">

    <div class="d-flex">
        <div th:replace="~{fragments :: menuLateral('tecnicos')}"></div>

        <div class="flex-grow-1 p-4">
            <div class="container py-4">
                
                <div th:if="${mensagemSucesso}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 rounded-3 mb-4" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i><span th:text="${mensagemSucesso}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div th:if="${mensagemErro}" class="alert alert-danger alert-dismissible fade show shadow-sm border-0 rounded-3 mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${mensagemErro}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <div class="row">
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 p-4 mb-4 rounded-4">
                            <h5 class="card-title mb-4 text-primary fw-bold"><i class="bi bi-tools me-2"></i>Novo Técnico</h5>
                            
                            <form th:action="@{/tecnicos/salvar}" method="POST">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" th:if="${_csrf}" />
                                
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Nome Completo</label>
                                    <input type="text" name="nome" class="form-control bg-light border-0 shadow-sm" placeholder="Ex: Carlos Oliveira" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">CPF</label>
                                    <input type="text" name="cpf" class="form-control bg-light border-0 shadow-sm" data-mascara="cpfCnpj" maxlength="14" placeholder="000.000.000-00">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Especialidade</label>
                                    <input type="text" name="especialidade" class="form-control bg-light border-0 shadow-sm" placeholder="Ex: Elétrica e Automação">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Telefone</label>
                                    <input type="text" name="telefone" class="form-control bg-light border-0 shadow-sm" data-mascara="telefone" maxlength="15" placeholder="(00) 00000-0000">
                                </div>
                                <button type="submit" class="btn btn-primary w-100 fw-bold shadow mt-2">
                                    <i class="bi bi-check-lg me-2"></i> Cadastrar Técnico
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="col-md-8">
                        <div class="card shadow-sm border-0 p-4 rounded-4">
                            <h5 class="card-title mb-4 text-primary fw-bold"><i class="bi bi-people-fill me-2"></i>Equipe Técnica</h5>
                            <div class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Nome</th>
                                            <th>CPF</th>
                                            <th>Especialidade</th>
                                            <th>Telefone</th>
                                            <th class="text-center">Ações</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="t : ${tecnicos}">
                                            <td th:text="${t?.nome}" class="fw-bold text-secondary"></td>
                                            <td th:text="${t?.cpf != null and !t.cpf.empty ? t.cpf : '---'}"></td>
                                            <td><span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25" th:text="${t?.especialidade}"></span></td>
                                            <td th:text="${t?.telefone}"></td>
                                            <td class="text-center">
                                                <a th:if="${t?.id != null}" 
                                                   th:href="@{/tecnicos/excluir/{id}(id=${t.id})}" 
                                                   class="btn btn-outline-danger border-0 btn-sm"
                                                   onclick="return confirm('Atenção: Se este técnico já tiver Ordens de Serviço, o sistema bloqueará a exclusão para proteger o histórico. Deseja tentar excluir?')">
                                                   <i class="bi bi-trash"></i>
                                                </a>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const mascaras = {
                telefone(value) {
                    value = value.replace(/\D/g, '');
                    value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
                    value = value.replace(/(\d)(\d{4})$/, '$1-$2');
                    return value;
                },
                cpfCnpj(value) {
                    value = value.replace(/\D/g, '');
                    if (value.length <= 11) {
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d)/, '$1.$2');
                        value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
                    } else {
                        value = value.replace(/^(\d{2})(\d)/, '$1.$2');
                        value = value.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
                        value = value.replace(/\.(\d{3})(\d)/, '.$1/$2');
                        value = value.replace(/(\d{4})(\d)/, '$1-$2');
                    }
                    return value;
                }
            };

            document.querySelectorAll('input[data-mascara]').forEach(input => {
                input.addEventListener('input', (e) => {
                    const tipo = e.target.dataset.mascara;
                    if (mascaras[tipo]) {
                        e.target.value = mascaras[tipo](e.target.value);
                    }
                });
            });
        });
    </script>
</body>
</html>
