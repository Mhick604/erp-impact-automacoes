# =================================================================
# CONFIGURAÇÃO DE BANCO DE DADOS INTELIGENTE (LOCAL / NUVEM)
# =================================================================

# Se a variável da nuvem existir, usa ela. Se não, usa o H2 local!
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:impactdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Permite que o Spring crie e atualize as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update

# Mostra os comandos no console (bom para debug)
spring.jpa.show-sql=true

# Configuração do console H2 para testes locais
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console